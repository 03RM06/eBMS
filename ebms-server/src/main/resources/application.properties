# e-Barangay Management System - Server Configuration

spring.application.name=ebms-server

# Database — FIX-D: SSL and connection params are env-var configurable for production.
# Dev defaults: SSL off (no local cert), PKR on (MySQL 8 password handshake).
# Production override example:
#   DB_HOST=db.prod  DB_SSL=true  DB_REQUIRE_SSL=true  DB_ALLOW_PKR=false
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ebms}?useSSL=${DB_SSL:false}&requireSSL=${DB_REQUIRE_SSL:false}&allowPublicKeyRetrieval=${DB_ALLOW_PKR:true}&serverTimezone=UTC&characterEncoding=utf8mb4
spring.datasource.username=${DB_USERNAME:ebms_app}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# Security / JWT
jwt.secret=${JWT_SECRET:change-me-in-production-use-a-256-bit-random-key}
jwt.access-token-expiry-minutes=15
jwt.refresh-token-expiry-days=7

# Account lockout
security.max-failed-attempts=5
security.lockout-duration-minutes=15

# Barangay configuration
barangay.name=Barangay Sample
barangay.doc.prefix=BRGY

# Document storage
document.storage.path=${DOCUMENT_STORAGE_PATH:./documents}

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# i18n
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Session cookies (FIX-8)
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m

# TLS — FIX-E: HTTPS is the enforced default (dev-keystore.p12 is included in resources).
# Generate dev keystore: keytool -genkeypair -alias ebms -keyalg RSA -keysize 2048 -keystore ebms-server/src/main/resources/dev-keystore.p12 -storetype PKCS12 -validity 365 -storepass changeit -dname "CN=localhost,OU=eBMS,O=Barangay,L=Manila,ST=Metro Manila,C=PH" -noprompt
# Override for local no-TLS dev: SSL_ENABLED=false  For production always use SSL_ENABLED=true.
server.ssl.enabled=${SSL_ENABLED:true}
server.ssl.key-store=${SSL_KEY_STORE:classpath:dev-keystore.p12}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${SSL_KEY_ALIAS:ebms}

# Logging
logging.level.gov.brgy.ebms=DEBUG
logging.level.org.springframework.security=INFO
