<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="#{app.name}">e-Barangay Management System</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); width: 360px; }
    h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.3rem; font-weight: bold; color: #555; }
    input { width: 100%; padding: 0.6rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 0.7rem; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #1558b0; }
    .alert { padding: 0.7rem; border-radius: 4px; margin-bottom: 1rem; text-align: center; }
    .alert-danger { background: #fde8e8; color: #c0392b; border: 1px solid #f5c6cb; }
    .alert-success { background: #e8f5e9; color: #27ae60; border: 1px solid #c3e6cb; }
    .lang-switch { text-align: right; margin-bottom: 1rem; font-size: 0.85rem; }
    .lang-switch a { color: #1a73e8; text-decoration: none; margin-left: 0.5rem; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="lang-switch">
    <a th:href="@{/portal/login(lang=en)}">EN</a>
    <a th:href="@{/portal/login(lang=fil)}">FIL</a>
  </div>
  <h2 th:text="#{app.name}">e-Barangay Management System</h2>

  <div th:if="${loginError}" class="alert alert-danger" th:text="#{auth.login.error}">
    Invalid username or password.
  </div>
  <div th:if="${loggedOut}" class="alert alert-success">
    You have been logged out successfully.
  </div>

  <form th:action="@{/portal/login}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div class="form-group">
      <label for="username" th:text="#{auth.username}">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username"/>
    </div>
    <div class="form-group">
      <label for="password" th:text="#{auth.password}">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password"/>
    </div>
    <button type="submit" th:text="#{auth.login}">Login</button>
  </form>
</div>
</body>
</html>
