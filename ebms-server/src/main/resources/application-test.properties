# Test profile - uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:ebms_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=false

jwt.secret=test-secret-key-for-unit-tests-only-256-bits-long-padded-here
jwt.access-token-expiry-minutes=15
jwt.refresh-token-expiry-days=7

security.max-failed-attempts=5
security.lockout-duration-minutes=15

barangay.name=Test Barangay
barangay.doc.prefix=TEST

document.storage.path=./target/test-documents

logging.level.gov.brgy.ebms=DEBUG

# FIX-E: tests do not start the full embedded server, but set this explicitly
# to avoid binding conflicts when server.ssl.enabled defaults to true in application.properties.
server.ssl.enabled=false
